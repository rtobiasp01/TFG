<form
  [formGroup]="productForm"
  (submit)="onSubmit()"
  id="productForm"
  novalidate
  enctype="multipart/form-data"
>
  <div class="info-form">
    <div class="info-izquierda">
      <h2>{{ id() ? 'Editar Producto' : 'Crear Producto' }}</h2>

      <div class="form-product-title">
        <input
          type="text"
          id="title"
          formControlName="title"
          required
          placeholder="Título del producto"
        />
      </div>

      <div class="radio-inputs">
        <label class="radio">
          <input type="radio" name="radio" checked />
          <span class="name">Información General</span>
          <div class="content">
            <div class="form-grid">
              <div class="form-group full-width">
                <label for="description">Descripción:</label>
                <textarea
                  id="description"
                  formControlName="description"
                  rows="4"
                  placeholder="Descripción completa del producto"
                ></textarea>
              </div>

              <div class="form-group full-width">
                <label for="short_description">Descripción corta:</label>
                <textarea
                  id="short_description"
                  formControlName="short_description"
                  rows="2"
                  placeholder="Descripción breve"
                ></textarea>
              </div>

              <div class="form-group">
                <label for="type">Tipo de producto:</label>
                <select id="type" formControlName="type">
                  <option value="simple">Simple</option>
                  <option value="variable">Variable</option>
                  <option value="virtual">Virtual</option>
                </select>
              </div>

              <div class="form-group">
                <label for="slug">Slug personalizado:</label>
                <input
                  type="text"
                  id="slug"
                  formControlName="slug"
                  placeholder="url-amigable-del-producto"
                />
              </div>
            </div>
          </div>
        </label>

        <label class="radio">
          <input type="radio" name="radio" />
          <span class="name">Precios e Inventario</span>
          <div class="content">
            <div class="form-grid">
              <div class="form-group">
                <label for="price">Precio (€):</label>
                <input
                  type="number"
                  id="price"
                  formControlName="price"
                  step="0.01"
                  required
                  placeholder="0.00"
                />
              </div>

              <div class="form-group">
                <label for="sku">SKU:</label>
                <input
                  type="text"
                  id="sku"
                  formControlName="sku"
                  placeholder="Código de inventario"
                />
              </div>

              <div class="form-group">
                <label for="stock_status">Estado de stock:</label>
                <select id="stock_status" formControlName="stock_status">
                  <option value="in_stock">En stock</option>
                  <option value="out_of_stock">Agotado</option>
                  <option value="on_backorder">Reserva</option>
                </select>
              </div>

              <div class="form-group">
                <label for="stock_quantity">Cantidad:</label>
                <input type="number" id="stock_quantity" formControlName="stock_quantity" min="0" />
              </div>

              <div class="form-group checkbox-group">
                <input type="checkbox" id="manage_stock" formControlName="manage_stock" />
                <label for="manage_stock" style="margin: 0">Gestionar stock</label>
              </div>
            </div>
          </div>
        </label>

        <label class="radio">
          <input type="radio" name="radio" />
          <span class="name">Logística</span>
          <div class="content">
            <div class="form-grid">
              <div class="form-group">
                <label for="dim_l">Largo (cm):</label>
                <input type="number" id="dim_l" formControlName="dim_l" step="0.01" min="0" />
              </div>
              <div class="form-group">
                <label for="dim_w">Ancho (cm):</label>
                <input type="number" id="dim_w" formControlName="dim_w" step="0.01" min="0" />
              </div>
              <div class="form-group">
                <label for="dim_h">Alto (cm):</label>
                <input type="number" id="dim_h" formControlName="dim_h" step="0.01" min="0" />
              </div>
              <div class="form-group">
                <label for="weight">Peso (kg):</label>
                <input type="number" id="weight" formControlName="weight" step="0.01" min="0" />
              </div>
            </div>
          </div>
        </label>
        <label class="radio">
          <input type="radio" name="radio" />
          <span class="name">Atributos</span>
          <div class="content">
            <table>
              <thead>
                <tr>
                  <th>Nombre</th>
                  <th>Valor</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>
                    <input
                      type="text"
                      id="miInput"
                      list="opcionesBD"
                      placeholder="Escribe algo..."
                      (input)="buscarAtributos($event)"
                    />

                    <datalist id="opcionesBD">
                      @for (atribute of atributes; track atribute._id) {
                        <option value="{{ atribute.name }}">{{ atribute.name }}</option>
                      }
                    </datalist>

                    <button id="btnAccion">Ejecutar Acción</button>
                  </td>
                  <td>
                    <select name="atribute-values" id="atribute-values">
                      @for (item of atributeValues(); track $index) {
                        <option value="{{ item.value }}">{{ item.value }}</option>
                      }
                    </select>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </label>
      </div>
    </div>

    <div class="info-derecha">
      <div class="data-save-container">
        <div class="save-header">
          <h3>Publicación</h3>
        </div>

        <div class="save-actions">
          <button type="submit" class="btn-primary">
            {{ id() ? 'Actualizar Producto' : 'Guardar Producto' }}
          </button>
        </div>
      </div>

      <div class="image-upload-container">
        <h3>Imagen del producto</h3>
        <label for="image" class="upload-btn">Subir imagen</label>
        <input type="file" (change)="onFileSelected($event)" id="image" accept="image/*" />
        <div class="image-preview-area">
          @if (imagePath()) {
            <img [src]="imagePath()" alt="Imagen producto" />
          }
        </div>
      </div>
    </div>
  </div>
</form>
