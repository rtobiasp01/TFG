<form
  [formGroup]="productForm"
  (submit)="onSubmit()"
  (keydown.enter)="$event.preventDefault()"
  id="productForm"
>
  <div class="info-form">
    <div class="info-izquierda">
      <h2>{{ id() ? 'Editar Producto' : 'Crear Producto' }}</h2>

      <div class="form-product-title">
        <input
          type="text"
          id="title"
          formControlName="title"
          required
          placeholder="Título del producto"
        />
      </div>

      <div class="radio-inputs">
        <label class="radio">
          <input type="radio" name="radio" checked />
          <span class="name">Información General</span>
          <div class="content">
            <div class="form-grid">
              <div class="form-group full-width">
                <label for="description">Descripción:</label>
                <textarea
                  id="description"
                  formControlName="description"
                  rows="4"
                  placeholder="Descripción completa del producto"
                ></textarea>
              </div>

              <div class="form-group full-width">
                <label for="short_description">Descripción corta:</label>
                <textarea
                  id="short_description"
                  formControlName="short_description"
                  rows="2"
                  placeholder="Descripción breve"
                ></textarea>
              </div>

              <div class="form-group">
                <label for="type">Tipo de producto:</label>
                <select id="type" formControlName="type" (change)="onProductTypeSelected($event)">
                  <option value="simple">Simple</option>
                  <option value="variable">Variable</option>
                  <option value="virtual">Virtual</option>
                </select>
              </div>

              <div class="form-group">
                <label for="slug">Slug personalizado:</label>
                <input
                  type="text"
                  id="slug"
                  formControlName="slug"
                  placeholder="url-amigable-del-producto"
                />
              </div>
            </div>
          </div>
        </label>

        <label class="radio">
          <input type="radio" name="radio" />
          <span class="name">Precios e Inventario</span>
          <div class="content">
            <div class="form-grid">
              <div class="form-group">
                <label for="price">Precio (€):</label>
                <input
                  type="number"
                  id="price"
                  formControlName="price"
                  step="0.01"
                  required
                  placeholder="0.00"
                />
              </div>

              <div class="form-group">
                <label for="sku">SKU:</label>
                <input
                  type="text"
                  id="sku"
                  formControlName="sku"
                  placeholder="Código de inventario"
                />
              </div>

              <div class="form-group">
                <label for="stock_status">Estado de stock:</label>
                <select id="stock_status" formControlName="stock_status">
                  <option value="in_stock">En stock</option>
                  <option value="out_of_stock">Agotado</option>
                  <option value="on_backorder">Reserva</option>
                </select>
              </div>

              <div class="form-group checkbox-group">
                <input type="checkbox" id="manage_stock" formControlName="manage_stock" (change)="onManageStockChange()" />
                <label for="manage_stock" style="margin: 0">Gestionar stock</label>
              </div>

              <div class="form-group">
                <label for="stock_quantity">Cantidad:</label>
                <input type="number" id="stock_quantity" formControlName="stock_quantity" min="0" />
              </div>
            </div>
          </div>
        </label>

        @if (showLogisticsTab()) {
          <label class="radio">
            <input type="radio" name="radio" />
            <span class="name">Logística</span>
            <div class="content">
              <div class="form-grid" formGroupName="physical_attributes">
                <div class="form-group">
                  <label for="length">Largo (cm):</label>
                  <input type="number" id="length" formControlName="length" step="0.01" min="0" />
                </div>
                <div class="form-group">
                  <label for="width">Ancho (cm):</label>
                  <input type="number" id="width" formControlName="width" step="0.01" min="0" />
                </div>
                <div class="form-group">
                  <label for="height">Alto (cm):</label>
                  <input type="number" id="height" formControlName="height" step="0.01" min="0" />
                </div>
                <div class="form-group">
                  <label for="weight">Peso (kg):</label>
                  <input type="number" id="weight" formControlName="weight" step="0.01" min="0" />
                </div>
              </div>
            </div>
          </label>
        }

        @if (showVariantsTab()) {
          <label class="radio">
            <input type="radio" name="radio" />
            <span class="name">Variantes</span>
            <div class="content">
              <div class="variants-header">
                <button type="button" class="btn-secondary" (click)="addVariant()">Añadir variante</button>
              </div>

              <div formArrayName="variantes" class="variants-container">
                @for (variant of variantesControls(); track $index; let variantIndex = $index) {
                  <div class="variant-card" [formGroupName]="variantIndex">
                    <div class="variant-card-header">
                      <h4>Variante #{{ variantIndex + 1 }}</h4>
                      <button type="button" class="btn-danger" (click)="removeVariant(variantIndex)">Eliminar</button>
                    </div>

                    <div class="form-grid">
                      <div class="form-group full-width">
                        <label>Atributos de la variante (clave / valor):</label>
                        <div formArrayName="attributes" class="variant-attributes-container">
                          @for (attribute of variantAttributesControls(variantIndex); track $index; let attrIndex = $index) {
                            <div class="variant-attribute-row" [formGroupName]="attrIndex">
                              <input type="text" formControlName="key" placeholder="Ej: color" />
                              <input type="text" formControlName="value" placeholder="Ej: blanco" />
                              <button
                                type="button"
                                class="btn-danger btn-small"
                                (click)="removeVariantAttribute(variantIndex, attrIndex)"
                              >
                                Quitar
                              </button>
                            </div>
                          }

                          <button type="button" class="btn-secondary btn-small" (click)="addVariantAttribute(variantIndex)">
                            Añadir atributo
                          </button>
                        </div>
                      </div>

                      <div class="form-group">
                        <label>Stock:</label>
                        <input type="number" formControlName="stock" min="0" />
                      </div>

                      <div class="form-group">
                        <label>Precio adicional (€):</label>
                        <input type="number" formControlName="precio_adicional" min="0" step="0.01" />
                      </div>

                      <div class="form-group full-width">
                        <label>Imágenes (URLs separadas por coma):</label>
                        <textarea
                          formControlName="imagenes_text"
                          rows="2"
                          placeholder="https://img1.jpg, https://img2.jpg"
                        ></textarea>
                      </div>

                      <div class="form-group checkbox-group">
                        <input type="checkbox" formControlName="has_custom_physical_attributes" />
                        <label style="margin: 0">Usar atributos físicos propios</label>
                      </div>
                    </div>

                    @if (variant.get('has_custom_physical_attributes')?.value) {
                      <div class="form-grid" formGroupName="physical_attributes">
                        <div class="form-group">
                          <label>Largo (cm):</label>
                          <input type="number" formControlName="length" step="0.01" min="0" />
                        </div>

                        <div class="form-group">
                          <label>Ancho (cm):</label>
                          <input type="number" formControlName="width" step="0.01" min="0" />
                        </div>

                        <div class="form-group">
                          <label>Alto (cm):</label>
                          <input type="number" formControlName="height" step="0.01" min="0" />
                        </div>

                        <div class="form-group">
                          <label>Peso (kg):</label>
                          <input type="number" formControlName="weight" step="0.01" min="0" />
                        </div>
                      </div>
                    }
                  </div>
                }
              </div>
            </div>
          </label>
        }
      </div>
    </div>

    <div class="info-derecha">
      <div class="data-save-container">
        <div class="save-header">
          <h3>Publicación</h3>
        </div>

        <div class="save-actions">
          <button type="submit" class="btn-primary">
            {{ id() ? 'Actualizar Producto' : 'Guardar Producto' }}
          </button>
        </div>
      </div>

      <div class="image-upload-container">
        <h3>Imagen del producto</h3>
        <label for="image" class="upload-btn">Subir imagen</label>
        <input type="file" (change)="onFileSelected($event)" id="image" accept="image/*" />
        <div class="image-preview-area">
          @if (imagePath()) {
            <img [src]="imagePath()" alt="Imagen producto" />
          }
        </div>
      </div>
    </div>
  </div>
</form>
