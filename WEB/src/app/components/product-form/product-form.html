@if (product$ | async; as product) {
  <form id="productForm" class="product-form" novalidate enctype="multipart/form-data">
    <h2>Crear Producto</h2>

    <div class="form-container">
      <!-- Campos del producto (izquierda) -->
      <div class="form-fields">
        <!-- Información básica -->
        <fieldset>
          <legend>Información básica</legend>

          <div class="form-group">
            <label for="title">Título:</label>
            <input
              type="text"
              id="title"
              name="title"
              required
              placeholder="Ingrese el título del producto"
            />
          </div>

          <div class="form-group">
            <label for="description">Descripción:</label>
            <textarea
              id="description"
              name="description"
              rows="4"
              placeholder="Descripción completa del producto"
            ></textarea>
          </div>

          <div class="form-group">
            <label for="short_description">Descripción corta:</label>
            <textarea
              id="short_description"
              name="short_description"
              rows="2"
              placeholder="Descripción breve"
            ></textarea>
          </div>

          <div class="form-group">
            <label for="price">Precio:</label>
            <input type="number" id="price" name="price" step="0.01" required placeholder="0.00" />
          </div>

          <div class="form-group">
            <label for="sku">SKU:</label>
            <input type="text" id="sku" name="sku" placeholder="Código de inventario" />
          </div>

          <div class="form-group">
            <label for="stock_status">Estado de stock:</label>
            <select id="stock_status" name="stock_status">
              <option value="in_stock">En stock</option>
              <option value="out_of_stock">Agotado</option>
              <option value="on_backorder">Reserva</option>
            </select>
          </div>

          <div class="form-group">
            <label for="stock_quantity">Cantidad en stock:</label>
            <input type="number" id="stock_quantity" name="stock_quantity" min="0" />
          </div>

          <div class="form-group checkbox-group">
            <label for="manage_stock">Gestionar stock</label>
            <app-toggle-switch></app-toggle-switch>
          </div>

          <div class="form-group">
            <label for="type">Tipo de producto:</label>
            <select id="type" name="type">
              <option value="simple">Simple</option>
              <option value="variable">Variable</option>
            </select>
          </div>
        </fieldset>

        <!-- Dimensiones -->
        <fieldset>
          <legend>Dimensiones</legend>

          <div class="form-group">
            <label for="dim_l">Largo (cm):</label>
            <input type="number" id="dim_l" name="dim_l" step="0.01" min="0" />
          </div>

          <div class="form-group">
            <label for="dim_w">Ancho (cm):</label>
            <input type="number" id="dim_w" name="dim_w" step="0.01" min="0" />
          </div>

          <div class="form-group">
            <label for="dim_h">Alto (cm):</label>
            <input type="number" id="dim_h" name="dim_h" step="0.01" min="0" />
          </div>

          <div class="form-group">
            <label for="weight">Peso (kg):</label>
            <input type="number" id="weight" name="weight" step="0.01" min="0" />
          </div>
        </fieldset>

        <!-- Slug personalizado -->
        <div class="form-group">
          <label for="custom_slug">Slug personalizado:</label>
          <input
            type="text"
            id="custom_slug"
            name="custom_slug"
            placeholder="url-amigable-del-producto"
          />
        </div>
      </div>

      <!-- Imagen del producto (derecha) -->
      <div class="form-image">
        <fieldset>
          <legend>Imagen del producto</legend>
          <div class="form-group">
            <label for="image">Subir imagen:</label>
            <input type="file" id="image" name="image" accept="image/*" />
          </div>
          <!-- Previsualización opcional -->
          @if (product.image) {
            <div class="image-preview">
              <img id="preview" src="{{ product.image }}" alt="Imagen del producto" />
            </div>
          }
        </fieldset>
      </div>
    </div>

    <button type="submit" class="submit-btn">Guardar Producto</button>
  </form>
}
