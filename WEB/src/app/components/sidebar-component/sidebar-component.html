<div class="sidebar-container" [class.collapsed]="isCollapsed()">
  <div class="sidebar-header">
    <span class="logo-text" *ngIf="!isCollapsed()">Mi App</span>
    <button class="toggle-btn" (click)="toggleSidebar()">
      {{ isCollapsed() ? '➤' : '◀' }}
    </button>
  </div>

  <ul class="nav-list">
    <li *ngFor="let item of menuItems">
      <ng-container *ngIf="item.children; else singleItem">
        <div class="nav-item has-children" (click)="toggleSubmenu(item.label)">
          <span class="icon">{{ item.icon }}</span>
          <span class="label" *ngIf="!isCollapsed()">{{ item.label }}</span>
          <span class="arrow" *ngIf="!isCollapsed()">
            {{ isMenuOpen(item.label) ? '▾' : '▸' }}
          </span>
        </div>

        <ul class="submenu" *ngIf="isMenuOpen(item.label) && !isCollapsed()">
          <li *ngFor="let sub of item.children">
            <a [routerLink]="sub.route" routerLinkActive="active" class="nav-item sub-item">
              <span class="icon">{{ sub.icon }}</span>
              <span class="label">{{ sub.label }}</span>
            </a>
          </li>
        </ul>
      </ng-container>

      <ng-template #singleItem>
        <a [routerLink]="item.route" routerLinkActive="active" class="nav-item">
          <span class="icon">{{ item.icon }}</span>
          <span class="label" *ngIf="!isCollapsed()">{{ item.label }}</span>
        </a>
      </ng-template>
    </li>
  </ul>
</div>
